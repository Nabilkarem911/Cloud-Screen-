version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudsignage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudsignage
      POSTGRES_USER: cloudsignage
      POSTGRES_PASSWORD: cloudsignage_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
