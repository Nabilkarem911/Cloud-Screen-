# Stack: PostgreSQL + Nest API + Next Dashboard
#
# Browser API URL: set NEXT_PUBLIC_API_BASE_URL to how clients reach the API
# (e.g. http://YOUR_SERVER_IP:4000/api/v1 when BACKEND_PORT defaults to 4000 → container :3000). Dashboard SSR uses INTERNAL_API_BASE_URL
# to reach the backend inside the Docker network (service name `backend`).
#
# docker compose up --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudsignage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudsignage_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cloudsignage}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      # Monorepo root: required for npm workspaces + Prisma paths (do not use apps/backend as context).
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4000}:3000"
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: ${DATABASE_URL:-postgresql://cloudsignage:cloudsignage_dev_password@db:5432/cloudsignage?schema=public}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      PLAYER_HEARTBEAT_SECRET: ${PLAYER_HEARTBEAT_SECRET:-dev-player-heartbeat-secret}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # Reflect browser Origin (set false behind a reverse proxy with fixed origins)
      TRUST_DYNAMIC_CORS: ${TRUST_DYNAMIC_CORS:-true}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://127.0.0.1:3000/health\",r=>process.exit(r.statusCode===200?0:1)).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: '3000'
      # Browser → API (must be reachable from the user’s machine; use server IP/domain in production)
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      # Dashboard container (SSR) → API over the compose network
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:3000/api/v1}

volumes:
  pgdata:
