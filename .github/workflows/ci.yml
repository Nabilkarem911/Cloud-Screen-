name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    # Prisma CLI reads DATABASE_URL from the environment even for validate/generate (no live DB required).
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate (backend)
        working-directory: apps/backend
        run: npx prisma generate --config prisma.config.ts

      - name: i18n check (dashboard)
        run: npm run i18n:check

      - name: Prisma validate
        working-directory: apps/backend
        run: npx prisma validate --config prisma.config.ts

      - name: Backend build
        run: npm run build -w apps/backend

      - name: Backend unit tests
        run: npm run test -w apps/backend

      - name: Dashboard lint
        run: npm run lint -w apps/dashboard

      - name: Dashboard build
        run: npm run build -w apps/dashboard

      - name: Player build
        run: npm run build -w apps/player

      - name: Marketing build
        run: npm run build -w apps/marketing
