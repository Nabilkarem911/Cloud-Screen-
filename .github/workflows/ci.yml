name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: i18n check (dashboard)
        run: npm run i18n:check

      - name: Prisma validate
        working-directory: apps/backend
        run: npx prisma validate --schema=prisma/schema.prisma

      - name: Backend build
        run: npm run build -w apps/backend

      - name: Backend unit tests
        run: npm run test -w apps/backend

      - name: Dashboard lint
        run: npm run lint -w apps/dashboard

      - name: Dashboard build
        run: npm run build -w apps/dashboard

      - name: Player build
        run: npm run build -w apps/player

      - name: Marketing build
        run: npm run build -w apps/marketing
